name: Release

# Triggers on:
#  - pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`, or
#  - pushing to main branch (merge) — hybrid version selection:
#      * If package.json's version is newer than the latest v* tag, release that
#        (manual bump in the merged PR wins → good for minor/major).
#      * Otherwise auto-increment the patch from the latest tag (default → good
#        for hotfixes without touching package.json).
#  - manually from the Actions tab ("Run workflow") where you type the version.
on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.1 or v0.2.1). A matching git tag is created."
        required: true
        type: string

permissions:
  contents: write # required to create a release, tag, and upload the .vsix asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required so git describe --tags finds previous release tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        # The version is the single source of truth for this release.
        # - For tag pushes: extract from tag name (v0.1.0)
        # - For main branch pushes: hybrid
        #     * If package.json's version is newer than the latest v* tag, use it
        #       (the merged PR manually bumped for a minor/major release).
        #     * Otherwise auto-increment the patch of the latest tag
        #       (default behaviour — no manual bump needed for hotfixes).
        # - For manual dispatch: use the provided input.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST="${LATEST_TAG#v}"
            PKG=$(node -p "require('./package.json').version")
            # Compare package.json vs latest tag using `sort -V`.
            HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$PKG" | sort -V | tail -n1)
            if [ "$PKG" != "$LATEST" ] && [ "$HIGHEST" = "$PKG" ]; then
              # package.json is strictly greater than latest tag → manual bump wins.
              echo "Using manually bumped package.json version: $PKG (latest tag was $LATEST_TAG)"
              RAW="$PKG"
            else
              # Auto-increment patch from latest tag.
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              PATCH=$(echo "$LATEST" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              RAW="${MAJOR}.${MINOR}.${PATCH}"
              echo "Auto-incrementing patch: $LATEST_TAG → v$RAW (package.json = $PKG)"
            fi
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already released
        id: check-tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Version ${{ steps.version.outputs.tag }} already released."
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version from tag
        if: steps.check-tag.outputs.skipped == 'false'
        # Strip the leading "v" and write the version into package.json without
        # creating a commit/tag, so the .vsix is stamped with the release version.
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Lint
        if: steps.check-tag.outputs.skipped == 'false'
        run: npm run lint

      - name: Validate generated contribution paths
        if: steps.check-tag.outputs.skipped == 'false'
        run: npm run validate:contribution-paths

      - name: Create git tag (for main branch releases)
        if: steps.check-tag.outputs.skipped == 'false' && github.ref == 'refs/heads/main'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git tag "${{ steps.version.outputs.tag }}" || echo "Tag already exists"
          git push origin "${{ steps.version.outputs.tag }}" || echo "Tag push failed or already exists"

      - name: Package VSIX
        if: steps.check-tag.outputs.skipped == 'false'
        run: npx @vscode/vsce package --no-dependencies -o acdc-${{ steps.version.outputs.tag }}.vsix

      - name: Create GitHub Release
        if: steps.check-tag.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: acdc-*.vsix
          generate_release_notes: true
