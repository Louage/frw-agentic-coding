name: Release

# Triggers on:
#  - pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`, or
#  - pushing to main branch (merge) — releases ONLY when `package.json`'s
#    version is strictly greater than the latest `v*` tag (i.e. the merged PR
#    ran `Cut-Release.ps1` / `npm run release:cut`). Merges that do not bump
#    `package.json` are a no-op — no auto patch bump. This keeps the changelog
#    invariant enforceable: every release matches a promoted `[Unreleased]`
#    block in CHANGELOG.md.
#  - manually from the Actions tab ("Run workflow") where you type the version.
on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.1 or v0.2.1). A matching git tag is created."
        required: true
        type: string

permissions:
  contents: write # required to create a release, tag, and upload the .vsix asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required so git describe --tags finds previous release tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        # The version is the single source of truth for this release.
        # - For tag pushes: extract from tag name (v0.1.0).
        # - For main branch pushes: `package.json`'s version MUST be strictly
        #   greater than the latest `v*` tag; otherwise the release step is
        #   skipped (no auto-bump). This makes `Cut-Release.ps1` the canonical
        #   release path and keeps CHANGELOG.md in sync.
        # - For manual dispatch: use the provided input.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST="${LATEST_TAG#v}"
            PKG=$(node -p "require('./package.json').version")
            HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$PKG" | sort -V | tail -n1)
            if [ "$PKG" != "$LATEST" ] && [ "$HIGHEST" = "$PKG" ]; then
              echo "Using bumped package.json version: $PKG (latest tag was $LATEST_TAG)"
              RAW="$PKG"
              echo "should-release=true" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::package.json ($PKG) is not ahead of latest tag ($LATEST_TAG). Skipping release."
              echo "::notice::Run 'npm run release:cut' locally (or push a v* tag) to publish a new release."
              RAW="$PKG"
              echo "should-release=false" >> "$GITHUB_OUTPUT"
            fi
          else
            RAW="${GITHUB_REF_NAME}"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already released
        id: check-tag
        if: steps.version.outputs.should-release == 'true'
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Version ${{ steps.version.outputs.tag }} already released."
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version from tag
        if: steps.version.outputs.should-release == 'true' && steps.check-tag.outputs.skipped == 'false'
        # Strip the leading "v" and write the version into package.json without
        # creating a commit/tag, so the .vsix is stamped with the release version.
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Lint
        if: steps.version.outputs.should-release == 'true' && steps.check-tag.outputs.skipped == 'false'
        run: npm run lint

      - name: Validate generated contribution paths
        if: steps.version.outputs.should-release == 'true' && steps.check-tag.outputs.skipped == 'false'
        run: npm run validate:contribution-paths

      - name: Create git tag (for main branch releases)
        if: steps.version.outputs.should-release == 'true' && steps.check-tag.outputs.skipped == 'false' && github.ref == 'refs/heads/main'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git tag "${{ steps.version.outputs.tag }}" || echo "Tag already exists"
          git push origin "${{ steps.version.outputs.tag }}" || echo "Tag push failed or already exists"

      - name: Package VSIX
        if: steps.version.outputs.should-release == 'true' && steps.check-tag.outputs.skipped == 'false'
        run: npx @vscode/vsce package --no-dependencies -o acdc-${{ steps.version.outputs.tag }}.vsix

      - name: Create GitHub Release
        if: steps.version.outputs.should-release == 'true' && steps.check-tag.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: acdc-*.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: steps.version.outputs.should-release == 'true' && steps.check-tag.outputs.skipped == 'false'
        run: npx @vscode/vsce publish --no-dependencies --packagePath acdc-${{ steps.version.outputs.tag }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
