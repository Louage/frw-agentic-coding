name: Release

# Triggers on pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create a release and upload the .vsix asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        # The pushed tag (e.g. v0.2.0) is the single source of truth for the
        # version. Strip the leading "v" and write it into package.json without
        # creating a commit/tag, so the .vsix is stamped with the tag version.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o frw-agentic-coding-${{ github.ref_name }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frw-agentic-coding-*.vsix
          generate_release_notes: true
