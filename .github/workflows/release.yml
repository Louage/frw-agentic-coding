name: Release

# Triggers on either:
#  - pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`, or
#  - manually from the Actions tab ("Run workflow") where you type the version.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.1 or v0.2.1). A matching git tag is created."
        required: true
        type: string

permissions:
  contents: write # required to create a release, tag, and upload the .vsix asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        # The version is the single source of truth for this release. For a tag
        # push it comes from the tag name; for a manual run it comes from the
        # "version" input. We normalise to a bare number plus a "v"-prefixed tag.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set version from tag
        # Strip the leading "v" and write the version into package.json without
        # creating a commit/tag, so the .vsix is stamped with the release version.
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Lint
        run: npm run lint

      - name: Validate generated contribution paths
        run: npm run validate:contribution-paths

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o frw-agentic-coding-${{ steps.version.outputs.tag }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: frw-agentic-coding-*.vsix
          generate_release_notes: true
