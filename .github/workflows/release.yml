name: Release

# AUTOMATED release-on-merge — you never touch package.json manually.
#
# Triggers:
#  - Push to `main` (any merge): the workflow inspects Conventional-Commit
#    subjects since the latest `v*` tag and computes the next SemVer bump:
#      * BREAKING CHANGE (subject `type(scope)!:` or body `BREAKING CHANGE:`)
#        → major
#      * `feat:` / `feat(scope):`                                       → minor
#      * `fix:`, `perf:`, `refactor:`, `revert:`, non-conventional      → patch
#      * only `docs:`, `chore:`, `style:`, `test:`, `ci:`, `build:`     → skip
#    When a bump is required, the workflow:
#      1. Runs `Update-Changelog.ps1` to backfill `[Unreleased]` from git.
#      2. Runs `Cut-Release.ps1 -Version <computed> -NoConfirm -SkipCi
#         -AllowChangelogEdits` — promotes `[Unreleased]` → `[<newVersion>]`,
#         bumps `package.json`, commits `chore(release): v<newVersion>
#         [skip ci]`.
#      3. Pushes the release commit + tag back to `main`.
#      4. Packages the VSIX, creates the GitHub Release, publishes to the
#         VS Code Marketplace.
#    The pushed release commit is filtered out via the `[skip ci]` marker
#    AND the `chore(release):` prefix guard on the job, so no loop.
#
#  - Push of a `v*` tag: package the current commit under that tag. No
#    changelog mutation — the tag author is responsible for it. Useful for
#    republishing or shipping from a hotfix branch.
#
#  - `workflow_dispatch` (Actions tab, "Run workflow"): treats the input
#    version like an auto-bump — same CHANGELOG rewrite + push path as a
#    main-push, but the version is forced instead of computed.
on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Force a specific version (e.g. 1.3.0 or v1.3.0). Runs the full auto-release path."
        required: true
        type: string

permissions:
  contents: write # required to push the release commit + tag and create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the release commit the workflow just pushed (belt-and-suspenders
    # even with `[skip ci]` in the message).
    if: |
      github.event_name != 'push' ||
      startsWith(github.ref, 'refs/tags/') ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required so git describe --tags finds previous release tags
          # persist-credentials defaults to true — required so the workflow can push the release commit + tag.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine release mode + version
        id: version
        # Three modes:
        #   - tag        : github.ref is refs/tags/v*  → package as-is.
        #   - dispatch   : workflow_dispatch input     → force version, full path.
        #   - auto       : push to main                → compute bump from commits.
        # Sets outputs:
        #   mode         : tag | dispatch | auto | skip
        #   version      : 1.2.3       (no leading v)
        #   tag          : v1.2.3
        #   bump         : major | minor | patch | ''  (auto only)
        run: |
          set -euo pipefail

          MODE=""
          VERSION=""
          BUMP=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="dispatch"
            RAW="${{ inputs.version }}"
            VERSION="${RAW#v}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            MODE="tag"
            RAW="${GITHUB_REF_NAME}"
            VERSION="${RAW#v}"
          else
            # ----- auto: compute bump from Conventional Commits since last tag.
            LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST_TAG" ]; then
              BASE="0.0.0"
              RANGE="HEAD"
            else
              BASE="${LATEST_TAG#v}"
              RANGE="${LATEST_TAG}..HEAD"
            fi

            RELEASE_WORTHY=0
            while IFS= read -r sha; do
              [ -z "$sha" ] && continue
              SUBJECT=$(git log -1 --format="%s" "$sha")
              BODY=$(git log -1 --format="%b" "$sha")

              case "$SUBJECT" in
                "chore(release):"*) continue ;;
              esac

              # BREAKING → major.
              if echo "$SUBJECT" | grep -qE "^[a-zA-Z]+(\([^)]+\))?!:" \
                 || echo "$BODY" | grep -qE "^BREAKING CHANGE:"; then
                BUMP="major"
                RELEASE_WORTHY=1
                continue
              fi

              # feat → minor (unless we've already committed to major).
              if echo "$SUBJECT" | grep -qE "^feat(\([^)]+\))?:"; then
                [ "$BUMP" != "major" ] && BUMP="minor"
                RELEASE_WORTHY=1
                continue
              fi

              # Meta-only commits → do not force a release, but do not block one either.
              if echo "$SUBJECT" | grep -qE "^(docs|chore|style|test|ci|build)(\([^)]+\))?:"; then
                continue
              fi

              # fix, perf, refactor, revert, or non-conventional → at least patch.
              if [ -z "$BUMP" ]; then BUMP="patch"; fi
              RELEASE_WORTHY=1
            done < <(git log $RANGE --no-merges --format="%H")

            if [ "$RELEASE_WORTHY" = "0" ]; then
              echo "::notice::No user-facing commits since ${LATEST_TAG:-<root>}. Skipping release."
              MODE="skip"
            else
              MODE="auto"
              MAJOR=$(echo "$BASE" | cut -d. -f1)
              MINOR=$(echo "$BASE" | cut -d. -f2)
              PATCH=$(echo "$BASE" | cut -d. -f3)
              case "$BUMP" in
                major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR+1)); PATCH=0 ;;
                patch) PATCH=$((PATCH+1)) ;;
              esac
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
              echo "::notice::Auto-bumping ${LATEST_TAG:-v0.0.0} → v${VERSION} (${BUMP} bump)."
            fi
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Guard against duplicate tag
        if: steps.version.outputs.mode != 'skip'
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1 \
             && [ "${{ steps.version.outputs.mode }}" != "tag" ]; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists — aborting to avoid clobbering it."
            exit 1
          fi

      # -------------------------------------------------------------------
      # AUTO / DISPATCH path: rewrite CHANGELOG, bump package.json, commit,
      # push commit + tag. TAG path skips this entire section.
      # -------------------------------------------------------------------
      - name: Configure git identity (bot)
        if: steps.version.outputs.mode == 'auto' || steps.version.outputs.mode == 'dispatch'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Populate [Unreleased] from git
        if: steps.version.outputs.mode == 'auto' || steps.version.outputs.mode == 'dispatch'
        shell: pwsh
        run: pwsh -File automation/scripts/Update-Changelog.ps1

      - name: Cut release (promote CHANGELOG + bump package.json)
        if: steps.version.outputs.mode == 'auto' || steps.version.outputs.mode == 'dispatch'
        shell: pwsh
        run: |
          pwsh -File automation/scripts/Cut-Release.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -AllowChangelogEdits `
            -NoConfirm `
            -SkipCi

      - name: Push release commit + tag
        if: steps.version.outputs.mode == 'auto' || steps.version.outputs.mode == 'dispatch'
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      # -------------------------------------------------------------------
      # TAG path: package the current commit under the pushed tag. The tag
      # author is responsible for CHANGELOG state.
      # -------------------------------------------------------------------
      - name: Set package.json version from tag
        if: steps.version.outputs.mode == 'tag'
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      # -------------------------------------------------------------------
      # Common tail: validate + package + release + publish.
      # -------------------------------------------------------------------
      - name: Lint
        if: steps.version.outputs.mode != 'skip'
        run: npm run lint

      - name: Validate generated contribution paths
        if: steps.version.outputs.mode != 'skip'
        run: npm run validate:contribution-paths

      - name: Package VSIX
        if: steps.version.outputs.mode != 'skip'
        run: npx @vscode/vsce package --no-dependencies -o acdc-${{ steps.version.outputs.tag }}.vsix

      - name: Create GitHub Release
        if: steps.version.outputs.mode != 'skip'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: acdc-*.vsix
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: steps.version.outputs.mode != 'skip'
        run: npx @vscode/vsce publish --no-dependencies --packagePath acdc-${{ steps.version.outputs.tag }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
