name: Publish to GitHub Packages

# Runs automatically after a GitHub Release is published (including those
# created by the release.yml workflow on merge to main or via tag push).
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write # required to push to GitHub Packages npm registry

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@louage"

      - name: Install dependencies
        run: npm ci

      - name: Set version from release tag
        # Strip the leading "v" and stamp package.json with the release version.
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build extension
        run: npm run package

      - name: Prepare package for GitHub Packages
        # GitHub Packages npm registry requires a scoped package name (@owner/name).
        # The "private" flag prevents npm publish, so it is removed here.
        # These mutations only affect this ephemeral runner — the repo is never pushed.
        run: |
          jq '
            del(.private) |
            .name = "@louage/frw-agentic-coding" |
            .publishConfig = {
              "registry": "https://npm.pkg.github.com",
              "access": "restricted"
            }
          ' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
