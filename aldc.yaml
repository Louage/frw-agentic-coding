# ALDC Core Configuration v1.1
# Skills-based modularization with preserved orchestration + per-requirement contracts + global memory

core:
  version: "1.2.0"
  specFile: "docs/framework/ALDC-Core-Spec-v1.2.md"

toolkitRoot: ".github"

# Bundled citable knowledge base, consumed by al-review-subagent (Step 0) as an
# audit/citation layer. Does NOT replace instructions or native ALDC skills.
external:
  bcquality:
    mode: "bundled-extension-assets"      # packaged as VS Code chatSkills/chatInstructions
    # Master switch resolved ONCE by al-conductor and propagated to the subagents
    # (it is recorded in the plan doc; subagents consume the decision, they don't re-probe):
    #   auto  (default) — use bundled assets when present; absent -> native A-G
    #   true            — BCQuality is expected from bundled assets; warn + native fallback if absent
    #   false           — disabled: always native A-G (the explicit off switch)
    enabled: "auto"
    # Upstream source of the bundled knowledge base. The weekly external-source sync
    # copies this into assets/generated/microsoft-bcquality-assets and package.json
    # registers those files as chatSkills/chatInstructions. Keep url/ref/pinnedCommit
    # here for provenance, sync reproducibility, and evidence validation.
    url: "https://github.com/microsoft/BCQuality.git"
    ref: "main"                           # branch/tag to track when pinnedCommit is empty
    pinnedCommit: ""                       # optional: set a 40-hex SHA for reproducible, pinned evidence
    generatedSourceId: "microsoft-bcquality-assets"
    assetsRoot: "assets/generated/microsoft-bcquality-assets"
    skillRoot: "assets/generated/microsoft-bcquality-assets/skills"
    instructionRoot: "assets/generated/microsoft-bcquality-assets/instructions"
    consumedBy: ["agents/acdc-al-review-subagent.agent.md", "agents/bon.agent.md", "agents/wrench.agent.md"]
    # Policy when bundled BCQuality assets are absent or disabled.
    fallback:
      mode: "skills-mode"        # review natively via instructions + skills
      residual: "A-G"            # expand the native checklist from A/C/F/G to full A-G
      outcome: "not-applicable"  # the bcquality.outcome the agents record
      neverBlock: true           # a missing layer never fails/aborts the review
    pilotSkills:
      - "microsoft/skills/review/al-performance-review.md"
      - "microsoft/skills/review/al-security-review.md"
      - "microsoft/skills/review/al-style-review.md"
    evidence:
      persistedReportGlob: ".github/plans/**/*-bcquality-phase-*.json"
      validator: "tools/bcquality/validate_evidence.py"
      ciWorkflow: ".github/workflows/bcquality-evidence.yaml"

plans:
  root: ".github/plans"

contracts:
  globalMemory: "memory.md"
  namingConvention: "{req_name}.{type}.md"
  types:
    - "spec"
    - "architecture"
    - "test-plan"
  archiveFolder: ".github/plans/archive"

copilotEntrypoint: ".github/copilot-instructions.md"
copilotSource: "instructions/copilot-instructions.md"
# "trimmed": the always-on entrypoint is an intentional lean subset of the source
# (the ~31% trim). The validator then checks it is non-empty and smaller than the
# source instead of requiring byte-identity. Use "mirror" to require byte-identity.
copilotEntrypointMode: "trimmed"

required:
  agents:
    - "agents/angus.agent.md"
    - "agents/malcolm.agent.md"
    - "agents/phil.agent.md"
    - "agents/brian.agent.md"
    - "agents/bon.agent.md"
    - "agents/wrench.agent.md"

  subagents:
    - "agents/acdc-al-planning-subagent.agent.md"
    - "agents/acdc-al-review-subagent.agent.md"
    - "agents/acdc-al-implement-subagent.agent.md"

  workflows:
    - "prompts/al-spec.create.prompt.md"
    - "prompts/al-build.prompt.md"
    - "prompts/al-pr-prepare.prompt.md"
    - "prompts/al-memory.create.prompt.md"
    - "prompts/al-context.create.prompt.md"
    - "prompts/al-initialize.prompt.md"

  skills:
    required:
      - "skills/skill-api/SKILL.md"
      - "skills/skill-copilot/SKILL.md"
      - "skills/skill-debug/SKILL.md"
      - "skills/skill-performance/SKILL.md"
      - "skills/skill-events/SKILL.md"
      - "skills/skill-permissions/SKILL.md"
      - "skills/skill-testing/SKILL.md"
    recommended:
      - "skills/skill-migrate/SKILL.md"
      - "skills/skill-pages/SKILL.md"
      - "skills/skill-translate/SKILL.md"
      - "skills/skill-estimation/SKILL.md"

  instructions:
    - "instructions/al-guidelines.instructions.md"
    - "instructions/al-code-style.instructions.md"
    - "instructions/al-naming-conventions.instructions.md"
    - "instructions/al-performance.instructions.md"
    - "instructions/al-error-handling.instructions.md"
    - "instructions/al-events.instructions.md"
    - "instructions/al-testing.instructions.md"
    - "instructions/copilot-instructions.md"
    - "instructions/index.md"

  templates:
    - "docs/templates/spec-template.md"
    - "docs/templates/architecture-template.md"
    - "docs/templates/test-plan-template.md"
    - "docs/templates/memory-template.md"
    - "docs/templates/technical-spec-template.md"
    - "docs/templates/delivery-template.md"
    - "docs/templates/skill-template.md"

optional:
  agents:
    - "agents/chief.agent.md"
  skills:
    - "skills/skill-agent-instructions/SKILL.md"
    - "skills/skill-agent-task-patterns/SKILL.md"
    - "skills/skill-agent-toolkit/SKILL.md"
    - "skills/skill-manifest/SKILL.md"
    - "skills/skill-contribution-assistant/SKILL.md"
  workflows:
    - "prompts/al-agent.create.prompt.md"
    - "prompts/al-agent.task.prompt.md"
    - "prompts/al-agent.instructions.prompt.md"
    - "prompts/al-agent.test.prompt.md"
    - "prompts/al-agent.build-instructions.prompt.md"
  instructions:
    - "instructions/al-agent-toolkit.instructions.md"
  tools:
    - "tools/bc-agents/scaffold_agent.py"
    - "tools/bc-agents/validate_agent_config.sh"

validation:
  rules:
    missingPlansDir: "error"
    missingGlobalMemory: "error"
    missingTemplates: "error"
    missingToolkitFiles: "error"
    missingSkills: "error"
    copilotEntrypointCoherence: "warn"
    incompleteRequirementSets: "warn"
    missingRecommendedSkills: "warn"
    malformedAlFileName: "warn"
